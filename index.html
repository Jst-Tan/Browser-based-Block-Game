<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>ChromaBlast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cinema-bg" aria-hidden="true"></div>
    <div class="film-grain" aria-hidden="true"></div>

    <main class="stage">
        <header class="bar bar--top">
            <h1 class="title">ChromaBlast</h1>
            <p class="scores">
                <span id="current-score">0</span>
                <span class="scores__sep">·</span>
                <span id="high-score" class="scores__best">0</span>
            </p>
            <div class="bar__actions">
                <button id="btn-pause" class="btn-icon" type="button" aria-label="Pause">‖</button>
                <button id="btn-info" class="btn-icon" type="button" aria-label="Help">?</button>
                <button id="btn-sound" class="btn-icon" type="button" aria-label="Sound">
                    <span id="sound-icon-on">♪</span>
                    <span id="sound-icon-off" class="hidden">×</span>
                </button>
            </div>
        </header>

        <section class="bar bar--status" aria-label="Session status">
            <div class="chrono">
                <span class="visually-hidden" id="time-status-text">Time</span>
                <span class="chrono__value" id="time-remaining-text">300</span>
                <div class="chrono__track"><div class="chrono__fill" id="game-timer-bar"></div></div>
            </div>
            <div class="status-meta">
                <span class="status-meta__item">
                    Shift <strong id="gravity-countdown">30</strong>
                    <span class="status-meta__dir" id="gravity-dir-box">
                        <svg class="rotate-arrow clockwise" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 12a9 9 0 1 1-2.2-6M21 3v5h-5"/></svg>
                        <svg class="rotate-arrow counter-clockwise hidden" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 12a9 9 0 1 0 2.2-6M3 3v5h5"/></svg>
                    </span>
                </span>
                <span class="status-meta__item">
                    Lv <strong id="player-level">1</strong>
                    <span class="visually-hidden" id="level-xp-text">0 / 1k</span>
                </span>
                <span class="status-meta__item status-meta__item--accent">
                    ×<strong id="streak-count">0</strong>
                </span>
            </div>
            <div class="level-meter" aria-hidden="true"><div id="level-progress-bar"></div></div>
            <span class="visually-hidden" id="level-bonus-text"></span>
        </section>

        <section class="arena" id="board-frame-container">
            <canvas id="particle-canvas" aria-hidden="true"></canvas>
            <div class="board-grid" id="board" role="grid" aria-label="Game board"></div>
        </section>

        <section class="dock">
            <div class="pieces-shelf" id="pieces-shelf" aria-label="Pieces"></div>
            <div class="action-bar">
                <div class="hold-slot" id="hold-slot" title="Held piece"></div>
                <button id="btn-hold" class="btn-action" type="button">Hold</button>
                <button id="btn-undo" class="btn-action" type="button">Undo</button>
                <button id="btn-freeze" class="btn-action" type="button">Stasis</button>
            </div>
        </section>
    </main>

    <div class="overlay" id="event-popup" aria-live="assertive" hidden>
        <div class="card card--event" id="event-popup-card">
            <p class="card__glyph" id="event-popup-icon">◆</p>
            <h2 class="card__title" id="event-popup-title"></h2>
            <p class="card__body" id="event-popup-msg"></p>
            <p class="card__highlight" id="event-popup-bonus"></p>
            <button type="button" class="btn btn--primary" id="event-popup-continue">Continue</button>
        </div>
    </div>

    <div class="overlay overlay--modal active" id="modal-intro" role="dialog" aria-modal="true">
        <div class="card card--intro">
            <p class="card__eyebrow">Gravity Shift</p>
            <h2 class="card__title card__title--display">ChromaBlast</h2>
            <p class="card__body card__body--lead">Place blocks. Clear lines. Gravity shifts. Time falls.</p>
            <button id="btn-start" class="btn btn--primary" type="button">Begin</button>
        </div>
    </div>

    <div class="overlay overlay--modal" id="modal-paused" role="dialog" aria-modal="true">
        <div class="card">
            <h2 class="card__title">Paused</h2>
            <button id="btn-resume" class="btn btn--primary" type="button">Resume</button>
        </div>
    </div>

    <div class="overlay overlay--modal" id="modal-gameover" role="dialog" aria-modal="true">
        <div class="card">
            <h2 class="card__title">Session ended</h2>
            <p class="card__body" id="gameover-reason"></p>
            <p class="card__stat"><span id="final-score">0</span> · Lv <span id="final-level">1</span> · <span id="final-chromas">0</span> chroma</p>
            <button id="btn-restart" class="btn btn--primary" type="button">Play again</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
